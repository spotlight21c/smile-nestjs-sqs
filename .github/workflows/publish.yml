name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate (Nest ${{ matrix.nest-major }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        nest-major: [10, 11]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.5.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Align NestJS major version
        run: >
          pnpm add -D
          @nestjs/common@^${{ matrix.nest-major }}.0.0
          @nestjs/core@^${{ matrix.nest-major }}.0.0
          @nestjs/testing@^${{ matrix.nest-major }}.0.0
          @nestjs/terminus@^${{ matrix.nest-major }}.0.0

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Unit tests
        run: pnpm test

      - name: Start LocalStack
        uses: localstack/setup-localstack@v0.2.2
        with:
          image-tag: 'latest'
          install-awslocal: 'true'

      - name: E2E tests
        env:
          SQS_ENDPOINT: http://127.0.0.1:4566
          AWS_REGION: us-east-1
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
        run: pnpm test:e2e

  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release_please.outputs.release_created }}
      releases_created: ${{ steps.release_please.outputs.releases_created }}

    steps:
      - name: Run release-please action
        id: release_please
        uses: googleapis/release-please-action@v4
        with:
          command: manifest
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' || needs.release-please.outputs.release_created == 'true' }}
    environment: npm
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout release commit
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.5.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Publish package
        run: npm publish --access public --provenance
