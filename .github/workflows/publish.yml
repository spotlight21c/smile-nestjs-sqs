name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate (Nest ${{ matrix.nest-major }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        nest-major: [10, 11]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.5.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Align NestJS major version
        run: >
          pnpm add -D
          @nestjs/common@^${{ matrix.nest-major }}.0.0
          @nestjs/core@^${{ matrix.nest-major }}.0.0
          @nestjs/testing@^${{ matrix.nest-major }}.0.0
          @nestjs/terminus@^${{ matrix.nest-major }}.0.0

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Unit tests
        run: pnpm test

      - name: Start LocalStack
        uses: localstack/setup-localstack@v0.2.2
        with:
          image-tag: 'latest'
          install-awslocal: 'true'

      - name: E2E tests
        env:
          SQS_ENDPOINT: http://127.0.0.1:4566
          AWS_REGION: us-east-1
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
        run: pnpm test:e2e

  publish:
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.5.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Publish package
        run: npm publish --access public --provenance
